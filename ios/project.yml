name: BoxIATutor
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

packages: {}

targets:
  BoxIATutor:
    type: application
    platform: iOS
    sources:
      - path: BoxIATutor/Sources
    resources:
      - path: BoxIATutor/Resources
    settings:
      base:
        INFOPLIST_FILE: BoxIATutor/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.box-ia-tutor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
    scheme:
      testTargets: []
      gatherCoverageData: false
